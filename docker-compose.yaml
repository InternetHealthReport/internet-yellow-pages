services:
  iyp_loader:
    image: neo4j/neo4j-admin:2026-community-debian
    profiles: ["local", "public_tls", "public_notls"]
    user: "${uid}:${gid}"
    container_name: iyp_loader
    tty: true
    volumes:
      - ./data:/data
      - ./dumps:/dumps
    # command: neo4j-admin database load neo4j --from-path=/dumps --verbose
    command: >
      bash -c "
        if [ -d /data/databases/neo4j ]; then
          echo 'Database already exists, skipping load.';
        else
          neo4j-admin database load neo4j --from-path=/dumps --verbose;
        fi
      "

  iyp:
    image: neo4j:5.26.21
    profiles: ["local"]
    user: "${uid}:${gid}"
    container_name: iyp
    restart: unless-stopped
    ports:
      - 7474:7474
      - 7687:7687
    volumes:
      - ./data:/data
      - ./plugins:/plugins
    environment:
      - NEO4J_AUTH=none
      - NEO4J_PLUGINS=["apoc"]
    depends_on:
      iyp_loader:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  iyp_readonly_tls:
    image: neo4j:5.26.21
    profiles: ["public_tls"]
    user: "${uid}:${gid}"
    container_name: iyp
    restart: unless-stopped
    ports:
      - 7473:7473
      - 7687:7687
    volumes:
      - ./data:/data
      - ./public/certificates:/ssl
      - ./public/conf_tls:/conf
      - ./public/logs:/logs
    depends_on:
      iyp_loader:
        condition: service_completed_successfully

  iyp_readonly_notls:
    image: neo4j:5.26.21
    profiles: ["public_notls"]
    user: "${uid}:${gid}"
    container_name: iyp
    restart: unless-stopped
    ports:
      - 7474:7474
      - 7687:7687
    volumes:
      - ./data:/data
      - ./plugins:/plugins
      - ./public/conf_notls:/conf
      - ./public/logs:/logs
    environment:
      - NEO4J_PLUGINS=["apoc"]
    depends_on:
      iyp_loader:
        condition: service_completed_successfully

  caddy:
    image: caddy:latest
    profiles: ["caddy"]
    user: "${uid}:${gid}"
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
    volumes:
      - ./site:/srv
      - caddy_data:/data
      - caddy_config:/config
    command: /usr/bin/caddy run --resume

  iyp_mcp:
    image: python:3.12-slim-trixie
    profiles: ["local"]
    container_name: iyp_mcp
    working_dir: /app
    volumes:
      - ./:/app:ro
    ports:
      - '8010:8010'
    command: bash -c "pip install pandas==2.3.3 fastmcp==2.14.4 pydantic==2.12.5 neo4j==6.1.0 tiktoken==0.12.0 && python -m mcp_server.server --port 8010 --sample-size 1000 --neo4j-read-timeout 60"
    depends_on:
      iyp:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
